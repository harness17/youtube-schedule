name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write   # SignPath の Trusted Build Verification に必要
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 署名前の .exe を作成（GitHub Releases へのアップロードは手動で行う）
      - name: Build (unsigned)
        run: npm run build:win -- --publish never

      # SignPath がアーティファクトを取得するために GitHub Actions artifact としてアップロード
      - name: Upload unsigned installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: dist/*-setup.exe

      # ---------------------------------------------------------------
      # SignPath によるコード署名（OSSプラン）
      # 有効化手順: .github/signpath-setup.md を参照
      # 未設定の場合はこのステップをスキップして unsigned のまま公開する
      # ---------------------------------------------------------------
      - name: Sign with SignPath
        id: signpath
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'youtube-schedule'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'initial'
          github-artifact-name: 'unsigned-installer'
          wait-for-completion: true
          output-artifact-directory: 'dist-signed'
        continue-on-error: true

      # 署名済み .exe が生成されていれば dist/ に上書きコピー
      - name: Use signed installer
        if: ${{ steps.signpath.outcome == 'success' }}
        run: Copy-Item dist-signed\*.exe dist\ -Force
        shell: pwsh

      # GitHub Release を作成（タグがすでに存在する場合はスキップ）
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # installer を GitHub Release にアップロード
      - name: Upload installer to GitHub Release
        run: |
          $exe = Get-ChildItem dist\*-setup.exe | Select-Object -First 1
          gh release upload "${{ github.ref_name }}" $exe.FullName --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
